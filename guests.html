<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персональные приглашения</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7DD3C0;
            --primary-light: #A8E6CF;
            --sky: #B4DCE8;
            --cream: #FDFBF7;
            --white: #FFFFFF;
            --text: #2C3E50;
            --text-light: #5D7184;
            --shadow: rgba(125, 211, 192, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: linear-gradient(180deg, var(--sky) 0%, var(--primary-light) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        main {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(34px, 5vw, 54px);
            font-weight: 400;
            text-align: center;
            margin-bottom: 16px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 36px;
            font-size: 18px;
        }

        .note {
            background: var(--white);
            padding: 16px 18px;
            border-radius: 12px;
            margin-bottom: 28px;
            box-shadow: 0 8px 25px var(--shadow);
            color: var(--text-light);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 20px;
        }

        .guest {
            font-size: 22px;
            margin-bottom: 12px;
            font-family: 'Playfair Display', serif;
        }

        .url {
            font-size: 13px;
            color: var(--text-light);
            word-break: break-all;
            margin-bottom: 12px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button,
        a.action {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
        }

        button.secondary,
        a.action {
            background: #edf8f5;
            color: var(--text);
        }
    </style>
</head>
<body>
    <main>
        <h1>Персональные приглашения</h1>
        <p class="subtitle">Выберите гостя и отправьте ссылку в мессенджер</p>
        <div class="note">
            Отредактируйте массив <code>GUEST_CODES</code> внизу файла и добавьте пары <code>{ id, name }</code>.
        </div>
        <div id="cards" class="cards"></div>
    </main>

    <script src="./rsvp-db.js"></script>
    <script>

        // Short invite codes (do not expose guest names in URL)
        const GUEST_CODES = [
            { id: "a7k2", name: "Светлана и Даниил" },
            { id: "b4m9", name: "Саша, Лена и Эмилия" },
            { id: "c8q1", name: "Женя, Серёжа, Наеми, Инес, Джоэль" },
            { id: "d3p6", name: "Артур & Кристина" },
            { id: "e5t0", name: "Оля" },
            { id: "f2n7", name: "Света, Юра и Андрей" },
            { id: "g9r4", name: "Марша и Титас" },
            { id: "h6v8", name: "Зури и Натали" },
            { id: "j1x3", name: "Мама Оля и Папа Володя" }
        ];

        function getInviteUrl(code) {
            const base = new URL("./index.html", window.location.href);
            base.searchParams.set("g", code);
            base.searchParams.set("v", "3");
            return base.toString();
        }

        function getStatusMeta(rec) {
            if (!rec || !rec.status) {
                return { text: "Без ответа", style: "background:#edf3f6;color:#4d6271;" };
            }

            if (rec.status === "yes") {
                return { text: "Подтверждено", style: "background:#e8f8f1;color:#226d4a;" };
            }

            if (rec.status === "no") {
                return { text: "Отказ", style: "background:#fdeeee;color:#8f3232;" };
            }

            return { text: "Без ответа", style: "background:#edf3f6;color:#4d6271;" };
        }

        async function shareGuest(guest) {
            const url = getInviteUrl(guest.id);
            const text = `Именное приглашение на свадьбу для ${guest.name}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `Приглашение для ${guest.name}`,
                        text,
                        url
                    });
                    return;
                } catch (error) {
                    // User cancelled or share failed.
                }
            }

            await navigator.clipboard.writeText(url);
            alert("Ссылка скопирована в буфер обмена.");
        }

        function createCard(guest, statusRec) {
            const inviteUrl = getInviteUrl(guest.id);
            const status = getStatusMeta(statusRec);

            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `
                <div class="guest">${guest.name}</div>
                <div class="url">${inviteUrl}</div>
                <div style="font-size:12px;border-radius:999px;display:inline-block;padding:5px 10px;margin-bottom:12px;${status.style}">
                    ${status.text}
                </div>
                <div class="actions">
                    <button class="primary" type="button">Поделиться</button>
                    <button class="secondary" type="button">Копировать</button>
                </div>
            `;

            const [shareBtn, copyBtn] = card.querySelectorAll("button");
            shareBtn.addEventListener("click", () => shareGuest(guest));
            copyBtn.addEventListener("click", async () => {
                await navigator.clipboard.writeText(inviteUrl);
                alert("Ссылка скопирована.");
            });

            return card;
        }

        async function renderGuests() {
            const cards = document.getElementById("cards");
            cards.innerHTML = "";
            const normalizedGuests = [];

            GUEST_CODES.forEach((guest) => {
                if (!guest || !guest.id || !guest.name) {
                    return;
                }
                normalizedGuests.push({
                    id: String(guest.id).trim().toLowerCase(),
                    name: String(guest.name).trim()
                });
            });

            let statuses = {};
            if (window.RSVP_DB && window.RSVP_DB.isConfigured()) {
                try {
                    statuses = await window.RSVP_DB.getStatuses(normalizedGuests.map((g) => g.id));
                } catch (error) {
                    statuses = {};
                }
            }

            normalizedGuests.forEach((guest) => {
                cards.appendChild(createCard(guest, statuses[guest.id]));
            });
        }

        renderGuests();
    </script>
</body>
</html>
