<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персональные приглашения</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7DD3C0;
            --primary-light: #A8E6CF;
            --sky: #B4DCE8;
            --cream: #FDFBF7;
            --white: #FFFFFF;
            --text: #2C3E50;
            --text-light: #5D7184;
            --shadow: rgba(125, 211, 192, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: linear-gradient(180deg, var(--sky) 0%, var(--primary-light) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        main {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(34px, 5vw, 54px);
            font-weight: 400;
            text-align: center;
            margin-bottom: 16px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 20px;
            font-size: 18px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--white);
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px var(--shadow);
        }

        .admin-auth {
            display: flex;
            gap: 8px;
            width: min(480px, 100%);
        }

        .admin-auth input {
            flex: 1;
            border: 1px solid #dbe9e5;
            border-radius: 999px;
            padding: 10px 14px;
            font-family: inherit;
        }

        .total-counter {
            color: var(--text-light);
            font-size: 16px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 20px;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .guest {
            font-size: 22px;
            margin-bottom: 12px;
            font-family: 'Playfair Display', serif;
        }

        .edit-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            padding: 0;
            flex-shrink: 0;
            font-size: 15px;
        }

        .guest-count {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .url {
            font-size: 13px;
            color: var(--text-light);
            word-break: break-all;
            margin-bottom: 12px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button,
        a.action {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
        }

        button.secondary,
        a.action {
            background: #edf8f5;
            color: var(--text);
        }

        .modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            padding: 20px;
            z-index: 10;
        }

        .modal[hidden] {
            display: none;
        }

        .modal-content {
            width: min(560px, 100%);
            background: var(--white);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.2);
        }

        .modal h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            margin-bottom: 14px;
        }

        .name-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .name-grid label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 10px;
            border-radius: 10px;
            background: #f4fbf9;
        }

        .new-name-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .new-name-row input {
            flex: 1;
            border: 1px solid #dbe9e5;
            border-radius: 999px;
            padding: 10px 14px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <main>
        <h1>Персональные приглашения</h1>
        <p class="subtitle">Выберите гостя и отправьте ссылку в мессенджер</p>
        <div class="toolbar">
            <div id="total-counter" class="total-counter"></div>
            <div class="admin-auth">
                <input id="admin-token-input" type="password" placeholder="Введите GUESTS_ADMIN_TOKEN" />
                <button id="admin-token-btn" class="secondary" type="button">Подключить</button>
            </div>
            <button id="add-card-btn" class="primary" type="button">+ Добавить карточку</button>
        </div>
        <div id="cards" class="cards"></div>
    </main>

    <div id="edit-modal" class="modal" hidden>
        <div class="modal-content">
            <h2>Редактирование гостей</h2>
            <div id="name-grid" class="name-grid"></div>
            <div class="new-name-row">
                <input id="new-name-input" type="text" placeholder="Добавить нового гостя" />
                <button id="new-name-btn" class="secondary" type="button">Добавить</button>
            </div>
            <div class="actions">
                <button id="save-edit-btn" class="primary" type="button">Сохранить</button>
                <button id="close-edit-btn" class="secondary" type="button">Отмена</button>
            </div>
        </div>
    </div>

    <script src="./rsvp-db.js"></script>
    <script>

        // Short invite codes (do not expose guest names in URL)
        let guestCodes = [];
        const issuedTokens = {};
        let editingId = null;
        let editSelectedNames = [];
        let loadingGuests = false;

        function parseNames(value) {
            return String(value || "")
                .replace(/\s*&\s*/g, ",")
                .replace(/\s+и\s+/gi, ",")
                .split(",")
                .map((name) => name.trim())
                .filter(Boolean);
        }

        function formatNames(names) {
            if (!names.length) {
                return "Без гостей";
            }
            if (names.length === 1) {
                return names[0];
            }
            if (names.length === 2) {
                return `${names[0]} и ${names[1]}`;
            }
            return `${names.slice(0, -1).join(", ")} и ${names[names.length - 1]}`;
        }

        function buildNamePool() {
            const pool = new Set();
            guestCodes.forEach((guest) => {
                parseNames(guest.name).forEach((name) => pool.add(name));
            });
            return Array.from(pool).sort((a, b) => a.localeCompare(b, "ru"));
        }

        function totalGuestsCount() {
            return guestCodes.reduce((sum, guest) => sum + parseNames(guest.name).length, 0);
        }

        function randomId() {
            return Math.random().toString(36).slice(2, 6);
        }

        function uniqueId() {
            const used = new Set(guestCodes.map((guest) => guest.id));
            let id = randomId();
            while (used.has(id)) {
                id = randomId();
            }
            return id;
        }

        function assertAdminReady() {
            if (!window.RSVP_DB || !window.RSVP_DB.isConfigured() || !window.RSVP_DB.hasAdminToken()) {
                throw new Error("Не настроены Supabase или GUESTS_ADMIN_TOKEN в rsvp-db.js");
            }
        }

        function getInviteUrl(code, token) {
            if (!token) {
                return "Сначала нажмите «Выпустить ссылку»";
            }
            const base = new URL("./index.html", window.location.href);
            base.searchParams.set("g", code);
            base.searchParams.set("t", token || "");
            base.searchParams.set("v", "3");
            return base.toString();
        }

        function getStatusMeta(rec) {
            if (!rec || !rec.status) {
                return { text: "Без ответа", style: "background:#edf3f6;color:#4d6271;" };
            }

            if (rec.status === "yes") {
                return { text: "Подтверждено", style: "background:#e8f8f1;color:#226d4a;" };
            }

            if (rec.status === "no") {
                return { text: "Отказ", style: "background:#fdeeee;color:#8f3232;" };
            }

            return { text: "Без ответа", style: "background:#edf3f6;color:#4d6271;" };
        }

        async function shareGuest(guest) {
            const url = getInviteUrl(guest.id, guest.token);
            if (!guest.token) {
                alert("Сначала выпустите ссылку для этого приглашения.");
                return;
            }
            const names = formatNames(parseNames(guest.name));
            const text = `Именное приглашение на свадьбу для ${names}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `Приглашение для ${names}`,
                        text,
                        url
                    });
                    return;
                } catch (error) {
                    // User cancelled or share failed.
                }
            }

            await navigator.clipboard.writeText(url);
            alert("Ссылка скопирована в буфер обмена.");
        }

        function createCard(guest, statusRec) {
            const inviteUrl = getInviteUrl(guest.id, guest.token);
            const status = getStatusMeta(statusRec);
            const names = parseNames(guest.name);
            const displayName = formatNames(names);

            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `
                <div class="card-top">
                    <div class="guest">${displayName}</div>
                    <button class="secondary edit-btn" type="button" title="Редактировать гостей">✏</button>
                </div>
                <div class="guest-count">Гостей: ${names.length}</div>
                <div class="url">${inviteUrl}</div>
                <div style="font-size:12px;border-radius:999px;display:inline-block;padding:5px 10px;margin-bottom:12px;${status.style}">
                    ${status.text}
                </div>
                <div class="actions">
                    <button class="primary" type="button">Поделиться</button>
                    <button class="secondary" type="button">Копировать</button>
                    <button class="secondary issue-btn" type="button">Выпустить ссылку</button>
                </div>
            `;

            const [editBtn, shareBtn, copyBtn, issueBtn] = card.querySelectorAll("button");
            editBtn.addEventListener("click", () => openEditModal(guest.id));
            shareBtn.addEventListener("click", () => shareGuest(guest));
            copyBtn.addEventListener("click", async () => {
                if (!guest.token) {
                    alert("Сначала выпустите ссылку для этого приглашения.");
                    return;
                }
                await navigator.clipboard.writeText(inviteUrl);
                alert("Ссылка скопирована.");
            });
            issueBtn.addEventListener("click", async () => {
                try {
                    assertAdminReady();
                    const result = await window.RSVP_DB.issueGuestLink(guest.id);
                    guest.token = String(result?.token || "").trim();
                    issuedTokens[guest.id] = guest.token;
                    await renderGuests();
                } catch (error) {
                    alert("Не удалось выпустить ссылку.");
                }
            });

            return card;
        }

        async function loadGuestsFromDb() {
            assertAdminReady();
            const result = await window.RSVP_DB.listGuests();
            const guests = Array.isArray(result.guests) ? result.guests : [];
            guestCodes = guests.map((g) => ({
                id: String(g.code || "").trim().toLowerCase(),
                token: String(issuedTokens[String(g.code || "").trim().toLowerCase()] || "").trim(),
                name: String(g.name || "").trim(),
                status: g.status || null
            })).filter((g) => g.id && g.name);
        }

        async function renderGuests() {
            const cards = document.getElementById("cards");
            cards.innerHTML = "";
            const normalizedGuests = [];

            guestCodes.forEach((guest) => {
                if (!guest || !guest.id) {
                    return;
                }
                normalizedGuests.push({
                    id: String(guest.id).trim().toLowerCase(),
                    token: String(guest.token || "").trim(),
                    name: String(guest.name || "").trim()
                });
            });

            normalizedGuests.forEach((guest) => {
                cards.appendChild(createCard(guest, { status: guest.status || null }));
            });

            document.getElementById("total-counter").textContent = `Всего гостей: ${totalGuestsCount()}`;
        }

        function closeEditModal() {
            editingId = null;
            editSelectedNames = [];
            document.getElementById("new-name-input").value = "";
            document.getElementById("edit-modal").hidden = true;
        }

        function renderEditorOptions() {
            const grid = document.getElementById("name-grid");
            const names = buildNamePool();
            grid.innerHTML = "";

            names.forEach((name) => {
                const label = document.createElement("label");
                label.innerHTML = `
                    <input type="checkbox" ${editSelectedNames.includes(name) ? "checked" : ""} />
                    <span>${name}</span>
                `;
                const checkbox = label.querySelector("input");
                checkbox.addEventListener("change", (event) => {
                    if (event.target.checked) {
                        if (!editSelectedNames.includes(name)) {
                            editSelectedNames.push(name);
                        }
                    } else {
                        editSelectedNames = editSelectedNames.filter((current) => current !== name);
                    }
                });
                grid.appendChild(label);
            });
        }

        function openEditModal(guestId) {
            const guest = guestCodes.find((item) => item.id === guestId);
            if (!guest) {
                return;
            }

            editingId = guestId;
            editSelectedNames = parseNames(guest.name);
            renderEditorOptions();
            document.getElementById("edit-modal").hidden = false;
        }

        function addNameFromInput() {
            const input = document.getElementById("new-name-input");
            const value = input.value.trim();
            if (!value) {
                return;
            }
            if (!editSelectedNames.includes(value)) {
                editSelectedNames.push(value);
            }
            input.value = "";
            renderEditorOptions();
        }

        async function saveEditModal() {
            if (!editingId) {
                return;
            }
            const guest = guestCodes.find((item) => item.id === editingId);
            if (!guest) {
                closeEditModal();
                return;
            }
            guest.name = formatNames(editSelectedNames);
            try {
                assertAdminReady();
                await window.RSVP_DB.upsertGuest({
                    code: guest.id,
                    name: guest.name
                });
            } catch (error) {
                alert("Не удалось сохранить в БД. Проверьте настройку Supabase.");
                return;
            }
            closeEditModal();
            await loadGuestsFromDb();
            await renderGuests();
        }

        async function addCard() {
            const newGuest = { id: uniqueId(), token: "", name: "Новый гость" };
            guestCodes.push(newGuest);
            try {
                assertAdminReady();
                await window.RSVP_DB.upsertGuest({
                    code: newGuest.id,
                    name: newGuest.name
                });
                await loadGuestsFromDb();
                await renderGuests();
                openEditModal(newGuest.id);
            } catch (error) {
                alert("Не удалось добавить карточку в БД.");
            }
        }

        document.getElementById("add-card-btn").addEventListener("click", () => {
            addCard();
        });
        document.getElementById("admin-token-btn").addEventListener("click", async () => {
            const input = document.getElementById("admin-token-input");
            const token = input.value.trim();
            window.RSVP_DB.setAdminToken(token);
            try {
                await loadGuestsFromDb();
                await renderGuests();
                input.value = "";
            } catch (error) {
                alert("Неверный админ-токен или ошибка подключения.");
            }
        });
        document.getElementById("close-edit-btn").addEventListener("click", closeEditModal);
        document.getElementById("save-edit-btn").addEventListener("click", () => {
            saveEditModal();
        });
        document.getElementById("new-name-btn").addEventListener("click", addNameFromInput);
        document.getElementById("new-name-input").addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                addNameFromInput();
            }
        });
        document.getElementById("edit-modal").addEventListener("click", (event) => {
            if (event.target.id === "edit-modal") {
                closeEditModal();
            }
        });

        (async () => {
            try {
                loadingGuests = true;
                // wait until admin token is entered by operator
            } catch (error) {
                alert("Не удалось загрузить гостей из БД. Проверьте SUPABASE_URL / ключи / GUESTS_ADMIN_TOKEN.");
            } finally {
                loadingGuests = false;
            }
            await renderGuests();
        })();
    </script>
</body>
</html>
